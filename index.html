<!DOCTYPE html>
<html lang="en">

  <link rel="stylesheet" href="style.css">

      <a href="en/index-en.html" class="lang-btn en">

          <img src="img/flag-en.png" class="lang-icon" alt="English">

  <script src="script.js"></script>
